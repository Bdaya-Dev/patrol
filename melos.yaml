name: patrol_plus
repository: https://github.com/Bdaya-Dev/patrol
packages:
  - packages/**

command:
  version:
    message: 'chore: release {new_package_versions}'
    includeCommitId: true
    workspaceChangelog: true
    linkToCommits: true
    hooks:
      # `melos version` bumps pubspec.yaml but NOT the hardcoded `version`
      # constant in patrol_cli_plus/lib/src/base/constants.dart. Sync it before
      # the version commit so the published CLI self-reports the correct version
      # (and the compatibility checker uses the right cliVersion). Without this,
      # 5.0.1 shipped reporting 5.0.0 until constants.dart was patched by hand.
      preCommit: |
        PKG_VERSION=$(grep -E '^version:' packages/patrol_cli_plus/pubspec.yaml | head -1 | sed -E 's/^version:[[:space:]]*([0-9][^[:space:]#]*).*/\1/')
        sed -i -E "s/^const version = '.*';/const version = '${PKG_VERSION}';/" packages/patrol_cli_plus/lib/src/base/constants.dart
        git add packages/patrol_cli_plus/lib/src/base/constants.dart
  publish:
    hooks:
      pre: melos run analyze

scripts:
  lint:all:
    run: melos run analyze && melos run format-check
    description: Run all static analysis checks.

  get:all:
    run: melos exec -- \
      flutter pub get
    description: Run `flutter pub get` for all packages.

  analyze:
    run: |
      melos exec -- \
        flutter analyze --fatal-infos
    description: Run `flutter analyze` for all packages.

  format:
    run: melos exec -- \
      dart format . --set-exit-if-changed
    description: Run `dart format` checks for all packages.

  # TODO: re-add
  # dartdoc:
  #   run: melos exec flutter pub run dartdoc
  #   description: Run dartdoc checks for all packages.

  test:
    run: melos exec -- flutter test .
    packageFilters:
      dirExists:
        - 'test'
    description: Run `flutter test` for selected packages.
