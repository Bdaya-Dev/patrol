name: patrol_mcp
description: >
  An MCP server that empowers AI assistants to control, automate, and monitor
  interactive Patrol development sessions in Flutter.
## Must be kept in sync with bin/patrol_mcp.dart.
version: 0.2.0
publish_to: none
homepage: https://patrol.leancode.co
repository: https://github.com/ahmednfwela/patrol/tree/master/packages/patrol_mcp
issue_tracker: https://github.com/ahmednfwela/patrol/issues
documentation: https://patrol.leancode.co
topics: [test, e2e, flutter-test, claude, ai]

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  adb_plus: ^5.0.0
  args: ^2.7.0
  dispose_scope: ^2.1.0
  image: ^4.5.4
  logging: ^1.3.0
  mcp_dart: ^2.1.0
  path: ^1.9.1
  patrol_cli_plus:
    path: ../patrol_cli_plus

dev_dependencies:
  leancode_lint: ^17.0.0
  test: ^1.25.0

