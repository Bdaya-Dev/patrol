name: patrol_plus
description: >
  A powerful, multiplatform E2E UI testing framework for Flutter apps that
  overcomes the limitations of integration_test by handling native interactions.
version: 5.1.1
homepage: https://patrol.leancode.co
repository: https://github.com/Bdaya-Dev/patrol/tree/master/packages/patrol_plus
issue_tracker: https://github.com/Bdaya-Dev/patrol/issues
documentation: https://patrol.leancode.co
topics:
  - test
  - integration-test
  - ui-test
  - e2e
  - native-automation
screenshots:
  - description: The Patrol framework logo.
    path: screenshots/logo.png

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.32.0'

dependencies:
  boolean_selector: ^2.1.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  http: '^1.1.0'
  json_annotation: ^4.8.1
  meta: ^1.10.0
  patrol_finders_plus: ^5.0.0
  patrol_log_plus: ^5.0.0
  shelf: ^1.4.1
  test_api: '^0.7.0'
  web: ^1.0.0

dev_dependencies:
  build_runner: ^2.6.0
  custom_lint: ^0.7.0
  json_serializable: ^6.10.0
  leancode_lint: ^17.0.0

flutter:
  plugin:
    platforms:
      android:
        package: pl.leancode.patrol
        pluginClass: PatrolPlugin
      ios:
        pluginClass: PatrolPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: PatrolPlugin
        sharedDarwinSource: true
      linux:
        pluginClass: PatrolPlugin
      windows:
        pluginClass: PatrolPlugin
      web:

# These files don't contain real credentials. They exist only for build to pass.
false_secrets:
  - /example/android/app/google-services.json
  - /example/ios/Runner/GoogleService-Info.plist
