name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - 'packages/patrol_plus/**'
      - 'packages/patrol_finders_plus/**'
      - 'packages/patrol_log_plus/**'
      - 'packages/patrol_cli_plus/**'
      - 'packages/adb_plus/**'
      - 'dev/e2e_app/**'
      - 'dev/cli_tests/**'
      - '.github/workflows/test-e2e.yml'
      - '.github/workflows/patrol-test.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/patrol_plus/**'
      - 'packages/patrol_finders_plus/**'
      - 'packages/patrol_log_plus/**'
      - 'packages/patrol_cli_plus/**'
      - 'packages/adb_plus/**'
      - 'dev/e2e_app/**'
      - 'dev/cli_tests/**'
      - '.github/workflows/test-e2e.yml'
      - '.github/workflows/patrol-test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# The test bundle includes ALL files under the target directory. Web tests
# import dart:ui_web which is unavailable on non-web platforms, so each
# platform group must use a test-target that only includes compatible tests.

# patrol-cli-setup is duplicated across jobs because workflow_call inputs
# cannot reference env vars — this is a GitHub Actions limitation.

jobs:
  e2e-desktop:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'linux,windows'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/e2e/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli_plus
      coverage: true
      verbose: true

  e2e-web:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'web'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/web/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli_plus
      coverage: true
      verbose: true

  e2e-android:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'android'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/e2e/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli_plus
      coverage: true
      verbose: true

  e2e-ios:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'ios'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/e2e/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli_plus
      coverage: true
      verbose: true

  e2e-macos:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'macos'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/e2e/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli_plus
      coverage: true
      verbose: true

  verify-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        working-directory: packages/patrol_cli_plus
        run: dart pub get

      - name: Run compatibility tests
        working-directory: packages/patrol_cli_plus
        run: dart test test/compatibility_checker/version_compatibility_test.dart

      - name: Generate compatibility table
        working-directory: packages/patrol_cli_plus
        run: dart run lib/src/compatibility_checker/generate_compatibility_table.dart

      - name: Verify tables are up to date
        run: |
          MODIFIED_TABLES=$(git status --porcelain "docs/**/compatibility-table.mdx")
          if [[ -n "$MODIFIED_TABLES" ]]; then
            echo "::error::Compatibility tables are not up to date. Run 'dart run lib/src/compatibility_checker/generate_compatibility_table.dart' and commit."
            exit 1
          fi

  analyze-native:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Analyze Windows C++ plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol_plus/windows/patrol_plugin.cpp \
            packages/patrol_plus/windows/patrol_plugin_c_api.cpp

      - name: Analyze Linux C plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol_plus/linux/patrol_plugin.cc

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Melos
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Run patrol_cli unit tests with branch coverage
        working-directory: packages/patrol_cli_plus
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage \
            --branch-coverage --function-coverage \
            -- --reporter expanded

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/patrol_cli_plus/coverage/lcov.info
          flags: patrol_cli
          fail_ci_if_error: false

  patrol-develop-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Preload Flutter artifacts
        run: flutter precache --android

      - name: Set up Melos and patrol_cli
        run: |
          dart pub global activate melos
          melos bootstrap
          dart pub global activate --source path packages/patrol_cli_plus

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run patrol develop test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim
          script: cd dev/cli_tests && dart pub get && dart patrol_develop_test.dart
