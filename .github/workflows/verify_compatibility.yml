name: Verify Version Compatibility

on:
  push:
    branches: [master]
    paths:
      - 'packages/patrol_cli_plus/lib/src/compatibility_checker/version_compatibility.dart'
      - 'packages/patrol_cli_plus/test/compatibility_checker/version_compatibility_test.dart'
  pull_request:
    branches: [master]
    paths:
      - 'packages/patrol_cli_plus/lib/src/compatibility_checker/version_compatibility.dart'
      - 'packages/patrol_cli_plus/test/compatibility_checker/version_compatibility_test.dart'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/patrol_cli_plus
    steps:
      - uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Run compatibility tests
        run: dart test test/compatibility_checker/version_compatibility_test.dart

      - name: Generate compatibility table
        run: dart run lib/src/compatibility_checker/generate_compatibility_table.dart

      - name: Verify tables are up to date
        working-directory: .
        run: |
          MODIFIED_TABLES=$(git status --porcelain "docs/**/compatibility-table.mdx")
          if [[ -n "$MODIFIED_TABLES" ]]; then
            echo "The following compatibility tables are not up to date:"
            echo "$MODIFIED_TABLES"
            echo "Please run 'dart run lib/src/compatibility_checker/generate_compatibility_table.dart' and commit the changes."
            exit 1
          fi
