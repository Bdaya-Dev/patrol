name: Prepare Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: bluefireteam/melos-action@v3
        with:
          run-versioning: true
          # NOTE: `publish-dry-run` is intentionally NOT set here. melos-action
          # runs `melos publish -y --dry-run` AFTER `melos version` rewrites each
          # package's pubspec.yaml + CHANGELOG.md but BEFORE those edits are
          # committed (the create-pr step commits them later). `dart pub publish
          # --dry-run` then emits a "checked-in files are modified in git"
          # warning and, in non-interactive mode (`-y`), exits 65 — aborting the
          # whole prepare run. The real publish validation happens in publish.yml
          # (triggered by the version tag), so the dry-run here is both redundant
          # and structurally guaranteed to fail.
          create-pr: true
          tag: true
          git-email: ahmednfwela@digrum.com
          git-name: ahmednfwela
